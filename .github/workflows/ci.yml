name: CI - Build & Push Image

on:
  push:
    branches:
      - main
    paths:
      - 'strapi-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: strapi-app

    env:
      AWS_REGION: us-east-1
      ECR_REPOSITORY: strapi-bluegreen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY
          
          echo "Building image with SHA tag..."
          docker build -t $IMAGE_URI:${{ github.sha }} .

          echo "Tagging image as latest..."
          docker tag $IMAGE_URI:${{ github.sha }} $IMAGE_URI:latest

          echo "Pushing SHA tag..."
          docker push $IMAGE_URI:${{ github.sha }}

          echo "Pushing latest tag..."
          docker push $IMAGE_URI:latest